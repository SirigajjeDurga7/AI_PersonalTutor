name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Auto-Detect and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # FIXED: Injected the explicit slug paths Hugging Face assigns to your Space layout natively
          PATHS=(
            "SirigajjeDurga/ai-personaltutor"
            "SirigajjeDurga7/ai-personaltutor"
            "SirigajjeDurga/AI_PersonalTutor"
            "SirigajjeDurga/AI-PersonalTutor"
            "SirigajjeDurga7/AI-PersonalTutor"
          )
          
          echo "Initializing Smart-Sync Pipeline..."
          
          for target in "${PATHS[@]}"; do
            echo "Attempting sync to: https://huggingface.co"
            git remote rm hf || true
            git remote add hf "https://oauth2:$HF_TOKEN@huggingface.co/spaces/$target"
            
            # If the push succeeds, exit with success immediately
            if git push hf main --force --prune; then
              echo "🎯 SUCCESS! Upload completed to: $target"
              exit 0
            fi
          done
          
          echo "❌ CRITICAL error: None of the path variations matched your Hugging Face Space setup."
          exit 1
